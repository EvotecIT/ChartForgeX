name: VS Code Extension

on:
  release:
    types:
      - published
  push:
    branches:
      - main
    paths:
      - 'ChartForgeX/**'
      - 'ChartForgeX.Markup*/**'
      - 'Directory.Build.props'
      - '.github/workflows/vscode-extension.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'ChartForgeX/**'
      - 'ChartForgeX.Markup*/**'
      - 'Directory.Build.props'
      - '.github/workflows/vscode-extension.yml'
  workflow_dispatch:
    inputs:
      publish_marketplace:
        description: 'Publish the packaged VSIX to the Visual Studio Marketplace'
        required: false
        type: boolean
        default: false
      pre_release:
        description: 'Package and publish as a pre-release extension'
        required: false
        type: boolean
        default: false
      release_tag:
        description: 'Existing ChartForgeX release tag to repair and attach the VSIX to'
        required: false
        type: string

permissions:
  contents: read

env:
  DOTNET_VERSION: |
    8.0.x
    10.0.x
  NODE_VERSION: 20.x
  NPM_AUDIT_LEVEL: moderate

jobs:
  package:
    name: Package VSIX
    if: ${{ github.event_name != 'release' || startsWith(github.event.release.tag_name, 'ChartForgeX-v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || inputs.release_tag }}

      - name: Validate release source
        if: ${{ github.event.release.tag_name != '' || inputs.release_tag != '' }}
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^ChartForgeX-v(?:\d{14}|\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?)$') {
            throw "ChartForgeX release tag is not valid: $env:RELEASE_TAG"
          }

          git fetch origin main
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to fetch origin/main for release source validation.'
          }

          git merge-base --is-ancestor HEAD origin/main
          if ($LASTEXITCODE -ne 0) {
            throw 'Release publishing is only allowed from commits contained in origin/main.'
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ChartForgeX.Markup.VSCode/package-lock.json

      - name: Audit extension dependencies
        working-directory: ChartForgeX.Markup.VSCode
        run: |
          npm ci
          npm audit --omit=dev --audit-level ${{ env.NPM_AUDIT_LEVEL }}

      - name: Package extension
        shell: pwsh
        env:
          IS_PRE_RELEASE: ${{ (github.event_name == 'release' && github.event.release.prerelease) || (github.event_name == 'workflow_dispatch' && inputs.pre_release) }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
          RELEASE_PUBLISHED_AT: ${{ github.event.release.published_at }}
          SHOULD_PUBLISH: ${{ github.event_name == 'release' || inputs.publish_marketplace }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          function Convert-ChartForgeXReleaseToExtensionVersion {
            param(
              [Parameter(Mandatory)]
              [string] $TagName,

              [string] $PublishedAt
            )

            if ($TagName -match '^ChartForgeX-v(?<stamp>\d{14})$') {
              $stamp = $Matches.stamp
              $year = [int] $stamp.Substring(0, 4)
              $monthDay = [int] $stamp.Substring(4, 4)
              $time = [int] $stamp.Substring(8, 6)
              return "$year.$monthDay.$time"
            }

            if ($TagName -match '^ChartForgeX-v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') {
              if ([string]::IsNullOrWhiteSpace($PublishedAt)) {
                throw "Release publication time is required to stamp the VS Code extension for $TagName."
              }

              $published = [DateTimeOffset]::Parse(
                $PublishedAt,
                [Globalization.CultureInfo]::InvariantCulture,
                [Globalization.DateTimeStyles]::AssumeUniversal)
              $utc = $published.UtcDateTime
              $monthDay = ($utc.Month * 100) + $utc.Day
              $time = ($utc.Hour * 10000) + ($utc.Minute * 100) + $utc.Second
              return "$($utc.Year).$monthDay.$time"
            }

            throw "ChartForgeX release tags must use package semver (ChartForgeX-v1.0.3) or the legacy timestamp form (ChartForgeX-vYYYYMMDDHHMMSS). Current tag: $TagName"
          }

          $versionCases = @(
            @{ PublishedAt = '2026-01-02T03:04:05Z'; Expected = '2026.102.30405' },
            @{ PublishedAt = '2026-07-21T10:58:09Z'; Expected = '2026.721.105809' }
          )
          foreach ($case in $versionCases) {
            $version = Convert-ChartForgeXReleaseToExtensionVersion -TagName 'ChartForgeX-v1.0.3' -PublishedAt $case.PublishedAt
            if ($version -ne $case.Expected -or $version -notmatch '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$') {
              throw "VS Code extension release version '$version' is not the expected SemVer-safe value '$($case.Expected)'."
            }
          }

          function Set-ExtensionPackageVersion {
            param(
              [Parameter(Mandatory)]
              [string] $Version
            )

            $packagePath = 'ChartForgeX.Markup.VSCode/package.json'
            $lockPath = 'ChartForgeX.Markup.VSCode/package-lock.json'
            $package = Get-Content -LiteralPath $packagePath -Raw | ConvertFrom-Json
            $package.version = $Version
            $package | ConvertTo-Json -Depth 100 | Set-Content -LiteralPath $packagePath -Encoding utf8

            if (Test-Path -LiteralPath $lockPath) {
              $lock = Get-Content -LiteralPath $lockPath -Raw | ConvertFrom-Json -AsHashtable
              $lock['version'] = $Version
              $packages = $lock['packages']
              if ($null -ne $packages -and $packages.ContainsKey('')) {
                $packages['']['version'] = $Version
              }
              $lock | ConvertTo-Json -Depth 100 | Set-Content -LiteralPath $lockPath -Encoding utf8
            }

            return $package
          }

          function Test-MarketplaceVersionExists {
            param(
              [Parameter(Mandatory)]
              [string] $ExtensionId,

              [Parameter(Mandatory)]
              [string] $Version
            )

            $showOutput = npm exec -- vsce show $ExtensionId --json 2>$null
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($showOutput)) {
              Write-Host "Marketplace listing $ExtensionId was not found or could not be read. Publishing will create or update it." -ForegroundColor Yellow
              return $false
            }

            try {
              $listing = $showOutput | ConvertFrom-Json -ErrorAction Stop
            } catch {
              Write-Host "Marketplace listing $ExtensionId did not return JSON. Publishing will create or update it." -ForegroundColor Yellow
              return $false
            }

            if ($null -eq $listing -or $null -eq $listing.versions) {
              Write-Host "Marketplace listing $ExtensionId has no published versions. Publishing will create it." -ForegroundColor Yellow
              return $false
            }

            return @($listing.versions | Where-Object { $_.version -eq $Version }).Count -gt 0
          }

          $shouldPublishMarketplace = $env:SHOULD_PUBLISH -eq 'true'

          if (-not [string]::IsNullOrWhiteSpace($env:RELEASE_TAG)) {
            $publishedAt = $env:RELEASE_PUBLISHED_AT
            if ([string]::IsNullOrWhiteSpace($publishedAt)) {
              $publishedAt = gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --json publishedAt --jq '.publishedAt'
              if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($publishedAt)) {
                throw "Could not resolve publication time for release $env:RELEASE_TAG."
              }
            }

            $targetVersion = Convert-ChartForgeXReleaseToExtensionVersion -TagName $env:RELEASE_TAG -PublishedAt $publishedAt
            $package = Set-ExtensionPackageVersion -Version $targetVersion
            $extensionId = "$($package.publisher).$($package.name)"
            Write-Host "Stamped ChartForgeX Markup extension version $targetVersion from release tag $env:RELEASE_TAG." -ForegroundColor Cyan

            if (Test-MarketplaceVersionExists -ExtensionId $extensionId -Version $targetVersion) {
              Write-Host "Marketplace version $extensionId@$targetVersion already exists. The VSIX will be packaged and attached to the GitHub Release, but Marketplace publishing will be skipped." -ForegroundColor Yellow
              $shouldPublishMarketplace = $false
            }
          } else {
            $currentVersion = (Get-Content -LiteralPath 'ChartForgeX.Markup.VSCode/package.json' -Raw | ConvertFrom-Json).version
            $null = Set-ExtensionPackageVersion -Version $currentVersion
          }

          $params = @{
            OutputDirectory = 'dist'
            SkipNpmCi = $true
          }

          if ($env:IS_PRE_RELEASE -eq 'true') {
            $params.PreRelease = $true
          }

          if ($shouldPublishMarketplace) {
            if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch' -and $env:GITHUB_REF_NAME -ne 'main') {
              throw 'Marketplace publishing is only allowed from the main branch.'
            }

            $params.PublishMarketplace = $true
          }

          ./ChartForgeX.Markup.VSCode/scripts/package-vsix.ps1 @params

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: chartforgex-markup-vsix
          path: ChartForgeX.Markup.VSCode/dist/*.vsix
          if-no-files-found: error

  attach-release-asset:
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '') }}
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: chartforgex-markup-vsix
          path: release-vsix

      - name: Attach VSIX to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" release-vsix/*.vsix --repo "$GITHUB_REPOSITORY" --clobber
